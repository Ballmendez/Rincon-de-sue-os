<html lang="es">

    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="../index.html">
                    <img src="../img/logo_rincon_de_sueños.png" alt="Logo de Rincon de sueños" class="logorincon">
                </a>
                <h2 class="rinconletra">Rincon de Sueños</h2>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link" href="../index.html">Home</a>
                        <a class="nav-link" href="./quienes_somos.html">Quienes somos?<a>
                        <a class="nav-link" href="./productos.html">Productos</a>
                        <a class="nav-link" href="./galeria.html">Galeria</a>
                        <a class="nav-link active" aria-current="page" href="./contacto.html">Contacto</a>
                    </div>
                </div>
            </div>
        </nav>
    <h1 class="titulos">Contactanos!</h1>
    </header>
    <main>
        <h2 class="contactospagina">A traves de:</h2>
            <ul class="contactospagina">
                <nav>
                    <li>Whatsapp: 
                        <a href="https://wa.me/+541154036692/?text=Hola,%20te%20quería%20pedir%20un%20presupuesto%20para%20una%20torta%20de:%20" target="_blank">
                            <img src="../img/whatsapp.png" alt="Logo de whatsapp" class="rrss">
                        </a>
                    </li>
                    <li>Instagram: 
                        <a href="https://www.instagram.com/rincon_by_alejandrabistolfi/" target="_blank">
                            <img src="../img/instagram.png" alt="Logo instagram" class="rrss">
                        </a>
                    </li>
                </nav>
            </ul>
        <section>
            <h2 class="presupuestomail">O recibi el presupuesto por mail:</h2>
            <form action="./sumbit" method="post" class="form">
                <label for="nombre">Nombre</label>
                <input type="text" name="nombre" id="nombre" placeholder="Inserte nombre">

                <label for="mail">Tu gmail</label>
                <input type="text" name="mail" id="mail" placeholder="Inserte direccion de correo">
            
                <label for="telefono">Tu numero de telefono</label>
                <input type="tel" name="telefono" id="telefono" placeholder="Inserte numero de telefono">

                <label for="descripcion">Una descripcion detallada de tu pedido con todos los productos y tematica</label>
                <textarea name="descripcion" id="descripcion" placeholder="Describa como quiere el pedido detalladamente"></textarea>

                <label for="sumbit">Enviar</label>
                <input type="submit" value="Enviar">
            </form>
        </section>
    </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
